<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0c10" />
  <meta name="description" content="MTG Battlefield — life tracker, token tracker, dice roller" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Battlefield" />

  <!-- Apple touch icons -->
  <link rel="apple-touch-icon" sizes="180x180" href="icons/icon-180.png" />
  <link rel="apple-touch-icon" sizes="152x152" href="icons/icon-152.png" />
  <link rel="apple-touch-icon" sizes="120x120" href="icons/icon-120.png" />

  <!-- PWA manifest -->
  <link rel="manifest" href="manifest.json" />

  <!-- Favicon -->
  <link rel="icon" type="image/png" sizes="32x32" href="icons/icon-32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="icons/icon-16.png" />

  <title>MTG Battlefield</title>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root {
      height: 100%;
      background: #0a0c10;
      /* Safe area insets for notched phones */
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
    }
    body { overflow-x: hidden; }
    /* Prevent iOS double-tap zoom on buttons */
    button { touch-action: manipulation; }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- React + ReactDOM (production builds) -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <!-- Babel standalone to transpile JSX in-browser -->
  <!-- For production you'd replace this with a Vite/CRA build, but this works great for GitHub Pages -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- The app -->
  <script type="text/babel" src="mtg-token-tracker.jsx" data-type="module"></script>

  <script>
    // Mount the app once the JSX is transpiled
    // Babel standalone fires a custom event when done — we use a small polling fallback
    function mount() {
      if (window.__MTGApp) {
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(window.__MTGApp));
      } else {
        setTimeout(mount, 50);
      }
    }
    // Give Babel time to transpile
    window.addEventListener('load', () => setTimeout(mount, 200));
  </script>

  <!-- Register service worker -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js')
          .then(reg => console.log('SW registered:', reg.scope))
          .catch(err => console.log('SW registration failed:', err));
      });
    }
  </script>
</body>
</html>
