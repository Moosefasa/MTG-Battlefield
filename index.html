<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0c10" />
  <meta name="description" content="MTG Battlefield — life tracker, token tracker, dice roller" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Battlefield" />
  <title>MTG Battlefield</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root {
      height: 100%;
      background: #0a0c10;
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
    }
    body { overflow-x: hidden; }
    button { touch-action: manipulation; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.23.5/babel.min.js"></script>
  <script type="text/babel" data-presets="react,env" src="mtg-token-tracker.jsx"></script>
  <script>
    function mount() {
      if (window.__MTGApp) {
        try {
          const root = ReactDOM.createRoot(document.getElementById('root'));
          root.render(React.createElement(window.__MTGApp));
        } catch(e) {
          document.getElementById('root').innerHTML =
            '<div style="color:#c94c4c;padding:24px;font-family:monospace;font-size:13px;background:#0a0c10;min-height:100vh">' +
            '<div style="color:#c9a84c;font-size:16px;margin-bottom:12px">&#9888; Render Error</div>' +
            '<pre style="white-space:pre-wrap">' + e.message + '</pre></div>';
        }
      } else {
        setTimeout(mount, 50);
      }
    }
    window.addEventListener('load', () => setTimeout(mount, 200));
  </script>
</body>
</html>
